workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - android_release_keystore
      flutter: stable
      vars:
        PACKAGE_ID: "it.iscacchi.app"
        APP_NAME: "iScacchi"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Set package ID
        script: |
          if [ -n "$PACKAGE_ID" ]; then
            echo "Setting applicationId to $PACKAGE_ID"
            sed -i '' "s/applicationId = \".*\"/applicationId = \"$PACKAGE_ID\"/" android/app/build.gradle.kts 2>/dev/null || \
            sed -i "s/applicationId = \".*\"/applicationId = \"$PACKAGE_ID\"/" android/app/build.gradle.kts
            sed -i '' "s/namespace = \".*\"/namespace = \"$PACKAGE_ID\"/" android/app/build.gradle.kts 2>/dev/null || \
            sed -i "s/namespace = \".*\"/namespace = \"$PACKAGE_ID\"/" android/app/build.gradle.kts
          fi
      - name: Set app name
        script: |
          if [ -n "$APP_NAME" ]; then
            echo "Setting app name to $APP_NAME"
            sed -i '' "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" android/app/src/main/AndroidManifest.xml 2>/dev/null || \
            sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" android/app/src/main/AndroidManifest.xml
          fi
      - name: Set version code
        script: |
          OFFSET=10
          VERSION_CODE=$((PROJECT_BUILD_NUMBER + OFFSET))
          echo "Setting versionCode to $VERSION_CODE"
          sed -i '' "s/versionCode = .*/versionCode = $VERSION_CODE/" android/app/build.gradle.kts 2>/dev/null || \
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" android/app/build.gradle.kts
      - name: Build AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - adv1077@gmail.com
        notify:
          success: true
          failure: true
